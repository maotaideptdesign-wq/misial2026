<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>原青 MASIAL！職感未來式｜滿意度分析後台（手動輸入版）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{--pink:#F23D9E;--pink-deep:#D81E83;--blue:#076fb8;--blue-deep:#054d80;--red:#E2222E;--gold:#F6C23E;--teal:#1FB6A6;--orange:#F08A3C;--cream:#FBF3EA;--ink:#15131A;--radius:18px;}
  *{box-sizing:border-box;}html,body{margin:0;padding:0;}
  body{min-height:100vh;font-family:"Noto Sans TC",sans-serif;color:var(--ink);background:var(--blue);overflow-x:hidden;-webkit-font-smoothing:antialiased;}
  .app-bg{position:fixed;inset:0;z-index:0;background:var(--blue);}
  .sparkle-layer{position:absolute;inset:0;transition:transform .35s ease-out;will-change:transform;}
  .sparkle{position:absolute;width:26px;height:26px;background:var(--red);clip-path:polygon(50% 0%,61% 39%,100% 50%,61% 61%,50% 100%,39% 61%,0% 50%,39% 39%);opacity:.6;z-index:1;transform:scale(var(--s,1)) rotate(var(--r,0deg));animation:twinkle 3.2s ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:.35;}50%{opacity:.9;}}
  .stage{position:relative;z-index:2;max-width:1040px;margin:0 auto;padding:28px 16px 70px;}
  .window{background:var(--cream);border:4px solid var(--ink);border-radius:var(--radius);box-shadow:10px 10px 0 var(--ink);overflow:hidden;margin-bottom:26px;animation:pop-in .45s cubic-bezier(.2,.9,.25,1.2);}
  @keyframes pop-in{from{opacity:0;transform:translateY(14px) scale(.98);}to{opacity:1;transform:none;}}
  .titlebar{background:var(--pink);border-bottom:4px solid var(--ink);display:flex;align-items:center;justify-content:space-between;padding:10px 14px;}
  .titlebar .label{font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1 1 auto;}
  .titlebar img.logo-mini{height:18px;width:auto;display:block;}
  .traffic{display:flex;gap:8px;flex-shrink:0;}
  .traffic span{width:20px;height:20px;border:3px solid var(--ink);border-radius:5px;display:flex;align-items:center;justify-content:center;transition:transform .18s;}
  .traffic span:hover{transform:rotate(-10deg) scale(1.18);}
  .traffic span:nth-child(1){background:var(--red);}
  .traffic span:nth-child(2){background:#FFF3D6;}
  .traffic span:nth-child(3){background:var(--red);}
  .traffic span:nth-child(3)::after{content:"✕";color:var(--ink);font-size:13px;font-weight:900;line-height:1;}
  .body-area{padding:24px 22px;}

  .intro p{font-size:13px;color:#5a5468;line-height:1.7;margin:0 0 4px;}

  .btn{border:3px solid var(--ink);border-radius:12px;font-family:inherit;font-weight:700;font-size:13.5px;padding:9px 16px;cursor:pointer;box-shadow:3px 3px 0 var(--ink);transition:transform .12s,box-shadow .12s;background:#fff;}
  .btn:hover{transform:translateY(-2px);}
  .btn:active{transform:translateY(2px);box-shadow:1px 1px 0 var(--ink);}
  .btn-primary{background:var(--blue);color:#fff;}
  .btn-teal{background:var(--teal);color:#fff;}
  .btn-red{background:var(--red);color:#fff;}
  .btn-gold{background:var(--gold);}
  .btn-sm{font-size:12px;padding:7px 12px;}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

  .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:14px;}
  .stat-card{background:#fff;border:3px solid var(--ink);border-radius:14px;padding:14px 16px;box-shadow:3px 3px 0 rgba(21,19,26,.15);}
  .stat-card .num{font-size:26px;font-weight:900;font-family:"Archivo Black";}
  .stat-card .num.teal{color:var(--teal);}
  .stat-card .num.blue{color:var(--blue);}
  .stat-card .num.pink{color:var(--pink-deep);}
  .stat-card .lbl{font-size:12px;color:#5a5468;margin-top:2px;}

  .tab-row{display:flex;gap:8px;flex-wrap:wrap;}
  .tab-btn{border:3px solid var(--ink);border-radius:999px;background:#fff;font-family:inherit;font-size:12.5px;font-weight:700;padding:7px 16px;cursor:pointer;box-shadow:3px 3px 0 var(--ink);transition:all .15s;}
  .tab-btn:hover{transform:translateY(-2px);}
  .tab-btn.active{background:var(--blue);color:#fff;}
  .tab-btn.overall{background:var(--gold);}
  .tab-btn.overall.active{background:var(--pink-deep);color:#fff;}

  .total-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:#fff;border:3px solid var(--ink);border-radius:14px;padding:14px 16px;margin-bottom:18px;box-shadow:3px 3px 0 rgba(21,19,26,.12);}
  .total-row label{font-size:13.5px;font-weight:700;}
  .total-row input{width:110px;font-family:inherit;font-size:15px;font-weight:700;text-align:center;border:3px solid var(--ink);border-radius:10px;padding:8px 10px;background:#FFF9EE;color:var(--ink);}
  .total-row input:focus{outline:3px solid var(--gold);outline-offset:1px;}
  .total-row .hint{font-size:11.5px;color:#897f9c;}
  .readonly-note{font-size:12px;color:#897f9c;background:#F2E9D8;border:2px dashed var(--gold);border-radius:10px;padding:8px 12px;margin-bottom:16px;}

  .cat-head{display:flex;align-items:baseline;gap:10px;margin:26px 0 4px;}
  .cat-head .idx{width:30px;height:30px;border:3px solid var(--ink);border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;flex-shrink:0;}
  .cat-head h2{font-size:17px;margin:0;}
  .legend-row{display:flex;gap:14px;flex-wrap:wrap;margin:0 0 12px 40px;font-size:11px;}
  .legend-row span{display:inline-flex;align-items:center;gap:5px;}
  .legend-row i{width:10px;height:10px;border-radius:3px;display:inline-block;border:1.5px solid var(--ink);}

  .item-card{background:#fff;border:3px solid var(--ink);border-radius:14px;padding:13px 15px;margin-bottom:14px;box-shadow:3px 3px 0 rgba(21,19,26,.1);}
  .item-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:9px;}
  .item-name{font-size:13.5px;font-weight:700;}
  .item-pct{font-size:13px;font-weight:900;font-family:"Archivo Black";flex-shrink:0;}
  .item-pct.good{color:var(--teal);}
  .item-pct.mid{color:var(--orange);}
  .item-pct.bad{color:var(--red);}
  .item-pct.none{color:#b0a8c0;}

  .count-inputs{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:9px;}
  .count-cell{text-align:center;}
  .count-cell .cc-label{font-size:9.5px;color:#5a5468;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .count-cell input{width:100%;font-family:inherit;font-size:14px;font-weight:700;text-align:center;
    border:2.5px solid var(--ink);border-radius:8px;padding:6px 2px;background:#fff;color:var(--ink);}
  .count-cell input:focus{outline:2.5px solid var(--gold);outline-offset:1px;}
  .count-cell.c5 .cc-label{color:#076fb8;}
  .count-cell.c4 .cc-label{color:#1FB6A6;}
  .count-cell.c3 .cc-label{color:#c99a00;}
  .count-cell.c2 .cc-label{color:#F08A3C;}
  .count-cell.c1 .cc-label{color:#E2222E;}

  .bar-track{height:20px;border:2.5px solid var(--ink);border-radius:6px;overflow:hidden;display:flex;background:#fff;}
  .bar-seg{height:100%;transition:width .4s ease;}
  .item-meta{font-size:10.5px;color:#9b91ab;margin-top:5px;}

  .readonly .count-cell input{background:#F5F2EC;color:#7a7285;pointer-events:none;}

  .footer-note{position:relative;z-index:2;text-align:center;font-size:11px;color:rgba(255,255,255,.75);margin-top:18px;}
  .hidden{display:none!important;}
  @media(max-width:640px){
    .count-inputs{grid-template-columns:repeat(5,1fr);}
    .count-cell .cc-label{font-size:8.5px;}
    .body-area{padding:20px 16px;}
    .legend-row{margin-left:0;}
  }
  @media(prefers-reduced-motion:reduce){.sparkle,.window{animation:none!important;}}
</style>
</head>
<body>
<div class="app-bg" id="appBg"></div>
<div class="stage">

  <div class="window">
    <div class="titlebar">
      <span class="label"><img src="logo_暑工.svg" alt="" class="logo-mini">滿意度分析後台（手動輸入版）</span>
      <div class="traffic"><span></span><span></span><span></span></div>
    </div>
    <div class="body-area">
      <div class="intro">
        <p>此版本供工作人員手動輸入各題選項筆數，即時計算滿意度並可調整數字後重新產出報告，不需連接 GAS 後台。</p>
        <p>操作方式：切換場次分頁 → 填入「本場次問卷回收總份數」→ 逐題輸入五個選項的筆數 → 系統自動計算滿意度％與平均分數。</p>
      </div>
      <div class="toolbar" style="margin-top:14px;">
        <button class="btn btn-gold btn-sm" onclick="exportJSON()">💾 匯出目前資料（備份）</button>
        <button class="btn btn-sm" onclick="document.getElementById('importFile').click()">📂 匯入資料</button>
        <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importJSON(this)">
        <button class="btn btn-red btn-sm" onclick="resetCurrentRegion()">🗑 清空目前場次</button>
      </div>
      <div class="summary-grid" id="summaryGrid"></div>
    </div>
  </div>

  <div class="window">
    <div class="titlebar">
      <span class="label">場次切換</span>
      <div class="traffic"><span></span><span></span><span></span></div>
    </div>
    <div class="body-area" style="padding-top:18px;padding-bottom:18px;">
      <div class="tab-row" id="tabRow"></div>
    </div>
  </div>

  <div id="totalRowHost"></div>
  <div id="categoryWindows"></div>

  <div class="window">
    <div class="titlebar">
      <span class="label">產出報告</span>
      <div class="traffic"><span></span><span></span><span></span></div>
    </div>
    <div class="body-area" style="text-align:center;">
      <button class="btn btn-red" onclick="exportReport(currentRegion)">⬇ 產出目前場次報告</button>
    </div>
  </div>

</div>
<div class="footer-note">115 年度原住民族青年暑期工讀教育訓練　原住民族委員會</div>

<script>
/* ===================== 題目結構（與線上問卷一致，共21題）===================== */
const CATEGORIES = [
  { title:"行政庶務與環境服務", subtitle:"就本次活動的行政安排進行評分", items:[
    "活動事前聯繫","活動報到服務／場域指引","工作人員服務態度與協助","接駁交通安排","上課場域環境","餐點安排與口味","手冊與文宣品設計"
  ]},
  { title:"課程：原住民族政策", subtitle:"", items:[
    "課程期待程度","課程師資專業性","課程內容豐富性","課程時間安排","從中獲取專業知識"
  ]},
  { title:"課程：公務經驗分享", subtitle:"", items:[
    "課程師資專業性","課程內容豐富性"
  ]},
  { title:"部落參訪體驗", subtitle:"", items:[
    "部落參訪走讀","部落手作體驗","部落達人分享","議題分組討論及分享","體驗場域環境","部落餐食規劃","從中獲取專業知識"
  ]},
];
// 攤平成 21 個項目，各自帶類別索引
const ALL_ITEMS = [];
CATEGORIES.forEach((cat, ci) => cat.items.forEach((label, ii) => ALL_ITEMS.push({ cat: ci, catTitle: cat.title, label, key: ci+"-"+ii })));

const SCALE_LABELS = ["非常滿意","滿意","普通","不滿意","非常不滿意"];
const SCALE_COLORS = {5:"#076fb8",4:"#1FB6A6",3:"#F6C23E",2:"#F08A3C",1:"#E2222E"};
const REGIONS = ["台東區","北區","宜花區","中區","南區"];
const REDUCE_MOTION = window.matchMedia("(prefers-reduced-motion:reduce)").matches;

/* ===================== 資料狀態 ===================== */
// data[region] = { total: number, counts: { key: [v5,v4,v3,v2,v1] } }
function emptyRegionData(){
  const counts = {};
  ALL_ITEMS.forEach(it => counts[it.key] = [0,0,0,0,0]);
  return { total: 0, counts };
}
let data = {};
REGIONS.forEach(r => data[r] = emptyRegionData());

let currentRegion = REGIONS[0];

/* ===================== 計算 ===================== */
function computeItemStats(region, key){
  const c = data[region].counts[key]; // [v5,v4,v3,v2,v1]
  const total = data[region].total;
  const respondents = c.reduce((a,b)=>a+b,0);
  const satisfied = c[0]+c[1]+c[2];
  const pct = total > 0 ? Math.round(satisfied/total*1000)/10 : null;
  const scoreSum = c[0]*5 + c[1]*4 + c[2]*3 + c[3]*2 + c[4]*1;
  const avg = respondents > 0 ? Math.round(scoreSum/respondents*100)/100 : null;
  return { counts:c, respondents, pct, avg };
}

function computeOverallData(){
  const overall = emptyRegionData();
  REGIONS.forEach(r => {
    overall.total += data[r].total;
    ALL_ITEMS.forEach(it => {
      for(let i=0;i<5;i++) overall.counts[it.key][i] += data[r].counts[it.key][i];
    });
  });
  return overall;
}

/* ===================== render ===================== */
function renderAll(){
  renderSummary();
  renderTabs();
  renderTotalRow();
  renderCategories();
}

function renderSummary(){
  const isOverall = currentRegion === "overall";
  const rd = isOverall ? computeOverallData() : data[currentRegion];
  const validPcts = ALL_ITEMS.map(it => {
    const c = rd.counts[it.key];
    const satisfied = c[0]+c[1]+c[2];
    return rd.total > 0 ? satisfied/rd.total*100 : null;
  }).filter(p => p !== null);
  const avgPct = validPcts.length ? validPcts.reduce((a,b)=>a+b,0)/validPcts.length : null;
  const activeRegions = REGIONS.filter(r => data[r].total > 0).length;

  document.getElementById("summaryGrid").innerHTML = `
    <div class="stat-card"><div class="num blue">${rd.total}</div><div class="lbl">${isOverall?"五區合計":"本場次"}問卷回收份數</div></div>
    <div class="stat-card"><div class="num teal">${avgPct!==null?avgPct.toFixed(1)+"%":"—"}</div><div class="lbl">整體平均滿意度</div></div>
    <div class="stat-card"><div class="num pink">${activeRegions}</div><div class="lbl">已填寫場次數</div></div>
  `;
}

function renderTabs(){
  let html = REGIONS.map(r => `<button class="tab-btn ${currentRegion===r?'active':''}" onclick="switchTab('${r}')">${r}（${data[r].total}）</button>`).join("");
  html += `<button class="tab-btn overall ${currentRegion==='overall'?'active':''}" onclick="switchTab('overall')">📊 全部場次合計</button>`;
  document.getElementById("tabRow").innerHTML = html;
}

window.switchTab = function(region){
  currentRegion = region;
  renderAll();
};

function renderTotalRow(){
  const host = document.getElementById("totalRowHost");
  if(currentRegion === "overall"){
    const rd = computeOverallData();
    host.innerHTML = `<div class="readonly-note">📊 這是五區合計的唯讀檢視，總份數 = ${rd.total}。要修改數字請切換到個別場次分頁。</div>`;
    return;
  }
  const rd = data[currentRegion];
  host.innerHTML = `
    <div class="total-row">
      <label>本場次（${currentRegion}）問卷回收總份數：</label>
      <input type="number" min="0" id="totalInput" value="${rd.total}" oninput="updateTotal(this.value)">
      <span class="hint">滿意度％ = （非常滿意＋滿意＋普通）÷ 此總份數</span>
    </div>
  `;
}

window.updateTotal = function(val){
  const n = Math.max(0, parseInt(val,10) || 0);
  data[currentRegion].total = n;
  renderSummary();
  renderTabs();
  renderCategoriesInPlace(); // 只更新百分比與 meta，不重繪 input 焦點
};

function renderCategories(){
  const wrap = document.getElementById("categoryWindows");
  wrap.innerHTML = "";
  const isOverall = currentRegion === "overall";
  const rd = isOverall ? computeOverallData() : data[currentRegion];

  CATEGORIES.forEach((cat, ci) => {
    const win = document.createElement("div");
    win.className = "window";
    win.innerHTML = `
      <div class="titlebar">
        <span class="label">${cat.title}</span>
        <div class="traffic"><span></span><span></span><span></span></div>
      </div>
      <div class="body-area">
        <div class="cat-head"><span class="idx">${ci+1}</span><h2>${cat.title}</h2></div>
        ${cat.subtitle?`<p style="font-size:12px;color:#897f9c;margin:0 0 12px 40px;">${cat.subtitle}</p>`:""}
        <div class="legend-row">
          ${SCALE_LABELS.map((l,i)=>`<span><i style="background:${SCALE_COLORS[5-i]}"></i>${l}</span>`).join("")}
        </div>
        <div class="items-host"></div>
      </div>
    `;
    const host = win.querySelector(".items-host");

    cat.items.forEach((label, ii) => {
      const key = ci+"-"+ii;
      const stats = isOverall
        ? computeStatsFromCounts(rd.counts[key], rd.total)
        : computeItemStats(currentRegion, key);

      const card = document.createElement("div");
      card.className = "item-card" + (isOverall ? " readonly" : "");
      card.id = "card-"+key;
      card.innerHTML = buildItemInner(key, label, stats, isOverall);
      host.appendChild(card);
    });

    wrap.appendChild(win);
  });
}

// 只更新百分比/bar/meta 顯示，不重建 DOM（避免輸入框失焦）
function renderCategoriesInPlace(){
  const isOverall = currentRegion === "overall";
  ALL_ITEMS.forEach(it => {
    const stats = isOverall
      ? computeStatsFromCounts(computeOverallData().counts[it.key], computeOverallData().total)
      : computeItemStats(currentRegion, it.key);
    updateItemDisplay(it.key, stats);
  });
}

function computeStatsFromCounts(c, total){
  const respondents = c.reduce((a,b)=>a+b,0);
  const satisfied = c[0]+c[1]+c[2];
  const pct = total > 0 ? Math.round(satisfied/total*1000)/10 : null;
  const scoreSum = c[0]*5 + c[1]*4 + c[2]*3 + c[3]*2 + c[4]*1;
  const avg = respondents > 0 ? Math.round(scoreSum/respondents*100)/100 : null;
  return { counts:c, respondents, pct, avg };
}

function pctClass(p){ return p===null?"none":p>=85?"good":p>=70?"mid":"bad"; }

function buildItemInner(key, label, stats, isOverall){
  const total = stats.respondents;
  const segs = [0,1,2,3,4].map(i => {
    const val = stats.counts[i];
    const w = total ? (val/total*100) : 0;
    const scoreVal = 5-i;
    return w>0 ? `<div class="bar-seg" style="width:${w}%;background:${SCALE_COLORS[scoreVal]}" title="${SCALE_LABELS[i]} ${val}筆"></div>` : "";
  }).join("");

  const inputsHtml = [0,1,2,3,4].map(i => `
    <div class="count-cell c${5-i}">
      <div class="cc-label">${SCALE_LABELS[i]}</div>
      <input type="number" min="0" value="${stats.counts[i]}" ${isOverall?"readonly":""}
        oninput="updateCount('${key}',${i},this.value)">
    </div>`).join("");

  return `
    <div class="item-top">
      <span class="item-name">${label}</span>
      <span class="item-pct ${pctClass(stats.pct)}" id="pct-${key}">${stats.pct!==null?stats.pct.toFixed(1)+"%":"—"}</span>
    </div>
    <div class="count-inputs">${inputsHtml}</div>
    <div class="bar-track" id="bar-${key}">${segs}</div>
    <div class="item-meta" id="meta-${key}">平均分數 ${stats.avg!==null?stats.avg.toFixed(2):"—"} / 5　·　填答筆數 ${total}</div>
  `;
}

function updateItemDisplay(key, stats){
  const pctEl = document.getElementById("pct-"+key);
  const barEl = document.getElementById("bar-"+key);
  const metaEl = document.getElementById("meta-"+key);
  if(!pctEl) return;
  pctEl.textContent = stats.pct!==null ? stats.pct.toFixed(1)+"%" : "—";
  pctEl.className = "item-pct " + pctClass(stats.pct);
  const total = stats.respondents;
  barEl.innerHTML = [0,1,2,3,4].map(i=>{
    const val = stats.counts[i];
    const w = total ? (val/total*100) : 0;
    const scoreVal = 5-i;
    return w>0 ? `<div class="bar-seg" style="width:${w}%;background:${SCALE_COLORS[scoreVal]}" title="${SCALE_LABELS[i]} ${val}筆"></div>` : "";
  }).join("");
  metaEl.textContent = `平均分數 ${stats.avg!==null?stats.avg.toFixed(2):"—"} / 5　·　填答筆數 ${total}`;
}

window.updateCount = function(key, idx, val){
  const n = Math.max(0, parseInt(val,10) || 0);
  data[currentRegion].counts[key][idx] = n;
  const stats = computeItemStats(currentRegion, key);
  updateItemDisplay(key, stats);
  renderSummary();
  renderTabs();
};

/* ===================== 清空 / 匯出 / 匯入 ===================== */
window.resetCurrentRegion = function(){
  if(currentRegion === "overall"){ alert("請切換到個別場次分頁再清空。"); return; }
  if(!confirm(`確定要清空「${currentRegion}」的所有輸入資料嗎？此動作無法復原。`)) return;
  data[currentRegion] = emptyRegionData();
  renderAll();
};

window.exportJSON = function(){
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "滿意度問卷手動輸入資料_" + new Date().toISOString().slice(0,10) + ".json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

window.importJSON = function(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const imported = JSON.parse(e.target.result);
      REGIONS.forEach(r => {
        if(imported[r]){
          data[r] = { total: imported[r].total || 0, counts: {} };
          ALL_ITEMS.forEach(it => {
            data[r].counts[it.key] = (imported[r].counts && imported[r].counts[it.key]) || [0,0,0,0,0];
          });
        }
      });
      renderAll();
      alert("資料匯入成功！");
    } catch(err){
      alert("匯入失敗，檔案格式不正確：" + err.message);
    }
    input.value = "";
  };
  reader.readAsText(file, "utf-8");
};

/* ===================== 產出報告（A4 列印版）===================== */
window.exportReport = function(region){
  const isOverall = region === "overall";
  const rd = isOverall ? computeOverallData() : data[region];
  if(!rd.total){ alert("此場次尚未填寫問卷回收總份數，請先輸入。"); return; }

  const regionLabel = isOverall ? "全部場次（五區合計）" : region;
  const itemStats = ALL_ITEMS.map(it => ({
    ...it,
    stats: computeStatsFromCounts(rd.counts[it.key], rd.total)
  }));
  const validPcts = itemStats.map(i=>i.stats.pct).filter(p=>p!==null);
  const avgPct = validPcts.length ? validPcts.reduce((a,b)=>a+b,0)/validPcts.length : null;

  function pctColor(p){ return p===null?"#b0a8c0":p>=85?"#1FB6A6":p>=70?"#F08A3C":"#E2222E"; }

  function catSections(){
    return CATEGORIES.map((cat, ci) => {
      const catItems = itemStats.filter(i => i.cat === ci);
      const rows = catItems.map(item => {
        const s = item.stats;
        const total = s.respondents;
        const w = {};
        [0,1,2,3,4].forEach(i => { w[i] = total ? Math.round(s.counts[i]/total*1000)/10 : 0; });
        return `
        <div style="margin-bottom:16px;page-break-inside:avoid;">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;">
            <span style="font-size:13px;font-weight:700;">${item.label}</span>
            <span style="font-size:14px;font-weight:900;color:${pctColor(s.pct)};">${s.pct!==null?s.pct.toFixed(1)+"%":"—"}</span>
          </div>
          <div style="display:flex;height:20px;border-radius:5px;overflow:hidden;border:2px solid #15131A;">
            ${[0,1,2,3,4].map(i=>w[i]>0?`<div style="width:${w[i]}%;background:${SCALE_COLORS[5-i]};-webkit-print-color-adjust:exact;print-color-adjust:exact;"></div>`:"").join("")}
          </div>
          <div style="font-size:10px;color:#897f9c;margin-top:3px;">
            平均 ${s.avg!==null?s.avg.toFixed(2):"—"} / 5　·　填答筆數 ${total}
            　${[0,1,2,3,4].map(i=>`${SCALE_LABELS[i]} ${s.counts[i]}`).join("　")}
          </div>
        </div>`;
      }).join("");
      return `
      <div style="margin-top:24px;page-break-inside:avoid;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:6px;border-bottom:2.5px solid #076fb8;">
          <div style="width:24px;height:24px;border-radius:50%;background:#F6C23E;border:2.5px solid #15131A;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;flex-shrink:0;">${ci+1}</div>
          <h3 style="margin:0;font-size:14px;color:#076fb8;">${cat.title}</h3>
          ${cat.subtitle?`<span style="font-size:10.5px;color:#897f9c;">（${cat.subtitle}）</span>`:""}
        </div>
        ${rows}
      </div>`;
    }).join("");
  }

  const now = new Date().toLocaleString("zh-TW",{hour12:false});
  const html = `<!DOCTYPE html><html lang="zh-Hant"><head>
<meta charset="UTF-8"><title>滿意度報告 — ${regionLabel}</title>
<style>
  @page{size:A4 portrait;margin:2.54cm 1.9cm 2.54cm 1.9cm;}
  *{box-sizing:border-box;}
  body{font-family:"Microsoft JhengHei","Noto Sans TC",sans-serif;color:#15131A;font-size:13px;line-height:1.6;margin:0;padding:0;}
  @media print{.no-print{display:none!important;}body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
</style></head><body>
<div class="no-print" style="position:fixed;top:16px;right:16px;z-index:999;display:flex;gap:8px;">
  <button onclick="window.print()" style="background:#076fb8;color:#fff;border:2.5px solid #15131A;border-radius:10px;padding:10px 20px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;box-shadow:3px 3px 0 #15131A;">列印 / 儲存 PDF</button>
  <button onclick="window.close()" style="background:#fff;border:2.5px solid #15131A;border-radius:10px;padding:10px 16px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;box-shadow:3px 3px 0 #15131A;">關閉</button>
</div>
<div style="border:3px solid #15131A;border-radius:12px;padding:18px 22px;margin-bottom:24px;background:#FBF3EA;">
  <div style="font-size:11.5px;color:#5a5468;margin-bottom:4px;">115年度原住民族青年暑期工讀教育訓練</div>
  <div style="font-size:11.5px;color:#5a5468;margin-bottom:4px;">原青 MASIAL！職感未來式</div>
  <div style="font-size:22px;font-weight:900;margin:4px 0 10px;">滿意度問卷分析報告</div>
  <div style="display:flex;gap:16px;flex-wrap:wrap;">
    <span style="background:#E2222E;color:#fff;border:2px solid #15131A;border-radius:999px;padding:4px 14px;font-size:12px;font-weight:700;">${regionLabel}</span>
    <span style="font-size:12px;color:#5a5468;margin:auto 0;">回覆份數：<strong>${rd.total}</strong>　·　整體平均滿意度：<strong style="color:${pctColor(avgPct)};">${avgPct!==null?avgPct.toFixed(1)+"%":"—"}</strong>　·　產出時間：${now}</span>
  </div>
  <div style="font-size:10.5px;color:#b0a8c0;margin-top:8px;">※ 本報告數據為手動輸入版本，非即時系統資料</div>
</div>
${catSections()}
<div style="margin-top:32px;padding-top:10px;border-top:1.5px solid #e3d9cf;font-size:10px;color:#897f9c;display:flex;justify-content:space-between;">
  <span>115年度原住民族青年暑期工讀教育訓練　原住民族委員會</span>
  <span>本報告由滿意度問卷分析後台（手動輸入版）產出</span>
</div>
</body></html>`;

  const w = window.open("","_blank","width=820,height=900");
  w.document.write(html);
  w.document.close();
};

/* ===================== sparkle ===================== */
(function(){
  const bg=document.getElementById("appBg"), layer=document.createElement("div");
  layer.className="sparkle-layer"; bg.appendChild(layer);
  [[4,8],[10,68],[88,14],[92,72],[50,3],[3,40],[95,44]].forEach(([x,y])=>{
    const s=document.createElement("div"); s.className="sparkle";
    s.style.left=x+"%"; s.style.top=y+"%";
    s.style.setProperty("--s",(0.6+Math.random()*0.8).toFixed(2));
    s.style.setProperty("--r",(Math.random()*30)+"deg");
    s.style.animationDelay=(Math.random()*3)+"s"; layer.appendChild(s);
  });
  if(!REDUCE_MOTION && window.matchMedia("(pointer:fine)").matches){
    document.addEventListener("mousemove",e=>{
      const dx=(e.clientX/window.innerWidth-.5)*2, dy=(e.clientY/window.innerHeight-.5)*2;
      layer.style.transform=`translate(${dx*12}px,${dy*12}px)`;
    });
  }
})();

/* ===================== init ===================== */
renderAll();
</script>
</body>
</html>
