<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>原青 MASIAL！職感未來式｜滿意度分析後台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{--pink:#F23D9E;--pink-deep:#D81E83;--blue:#076fb8;--blue-deep:#054d80;--red:#E2222E;--gold:#F6C23E;--teal:#1FB6A6;--orange:#F08A3C;--cream:#FBF3EA;--ink:#15131A;--radius:18px;}
  *{box-sizing:border-box;}html,body{margin:0;padding:0;}
  body{min-height:100vh;font-family:"Noto Sans TC",sans-serif;color:var(--ink);background:var(--blue);overflow-x:hidden;-webkit-font-smoothing:antialiased;}
  .app-bg{position:fixed;inset:0;z-index:0;background:var(--blue);}
  .sparkle-layer{position:absolute;inset:0;transition:transform .35s ease-out;will-change:transform;}
  .sparkle{position:absolute;width:26px;height:26px;background:var(--red);clip-path:polygon(50% 0%,61% 39%,100% 50%,61% 61%,50% 100%,39% 61%,0% 50%,39% 39%);opacity:.6;z-index:1;transform:scale(var(--s,1)) rotate(var(--r,0deg));animation:twinkle 3.2s ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:.35;}50%{opacity:.9;}}
  .stage{position:relative;z-index:2;max-width:980px;margin:0 auto;padding:28px 16px 70px;}
  .window{background:var(--cream);border:4px solid var(--ink);border-radius:var(--radius);box-shadow:10px 10px 0 var(--ink);overflow:hidden;margin-bottom:26px;animation:pop-in .45s cubic-bezier(.2,.9,.25,1.2);}
  @keyframes pop-in{from{opacity:0;transform:translateY(14px) scale(.98);}to{opacity:1;transform:none;}}
  .titlebar{background:var(--pink);border-bottom:4px solid var(--ink);display:flex;align-items:center;justify-content:space-between;padding:10px 14px;}
  .titlebar .label{font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1 1 auto;}
  .titlebar img.logo-mini{height:18px;width:auto;display:block;}
  .traffic{display:flex;gap:8px;flex-shrink:0;}
  .traffic span{width:20px;height:20px;border:3px solid var(--ink);border-radius:5px;display:flex;align-items:center;justify-content:center;transition:transform .18s;}
  .traffic span:hover{transform:rotate(-10deg) scale(1.18);}
  .traffic span:nth-child(1){background:var(--red);}
  .traffic span:nth-child(2){background:#FFF3D6;}
  .traffic span:nth-child(3){background:var(--red);}
  .traffic span:nth-child(3)::after{content:"✕";color:var(--ink);font-size:13px;font-weight:900;line-height:1;}
  .body-area{padding:26px 24px;}
  .connect-wrap h2{font-size:18px;margin:0 0 6px;}
  .connect-wrap p{font-size:13.5px;color:#5a5468;margin:0 0 18px;line-height:1.6;}
  .connect-row{display:flex;gap:10px;flex-wrap:wrap;}
  .connect-row input{flex:1 1 300px;font-family:inherit;font-size:13.5px;border:3px solid var(--ink);border-radius:12px;padding:11px 13px;background:#fff;color:var(--ink);box-shadow:3px 3px 0 var(--ink);}
  .connect-row input:focus{outline:3px solid var(--gold);outline-offset:1px;}
  .btn{border:3px solid var(--ink);border-radius:12px;font-family:inherit;font-weight:700;font-size:14px;padding:11px 18px;cursor:pointer;box-shadow:4px 4px 0 var(--ink);transition:transform .12s,box-shadow .12s;background:#fff;}
  .btn:hover{transform:translateY(-2px);}
  .btn:active{transform:translateY(2px);box-shadow:1px 1px 0 var(--ink);}
  .btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
  .btn-primary{background:var(--blue);color:#fff;}
  .btn-teal{background:var(--teal);color:#fff;}
  .btn-sm{font-size:12.5px;padding:8px 14px;}
  .error-msg{background:#FFE3E3;border:2px solid var(--red);color:#8a1620;font-size:12.5px;border-radius:10px;padding:10px 13px;margin-top:12px;}
  .spinner{display:inline-block;width:14px;height:14px;border:2.5px solid rgba(255,255,255,.5);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
  .stat-card{background:#fff;border:3px solid var(--ink);border-radius:14px;padding:14px 16px;box-shadow:3px 3px 0 rgba(21,19,26,.15);}
  .stat-card .num{font-size:26px;font-weight:900;font-family:"Archivo Black";}
  .stat-card .num.teal{color:var(--teal);}
  .stat-card .num.blue{color:var(--blue);}
  .stat-card .num.pink{color:var(--pink-deep);}
  .stat-card .lbl{font-size:12px;color:#5a5468;margin-top:2px;}
  .tab-row{display:flex;gap:8px;flex-wrap:wrap;}
  .tab-btn{border:3px solid var(--ink);border-radius:999px;background:#fff;font-family:inherit;font-size:12.5px;font-weight:700;padding:7px 16px;cursor:pointer;box-shadow:3px 3px 0 var(--ink);transition:all .15s;}
  .tab-btn:hover{transform:translateY(-2px);}
  .tab-btn.active{background:var(--blue);color:#fff;}
  .cat-head{display:flex;align-items:baseline;gap:10px;margin:28px 0 4px;}
  .cat-head .idx{width:30px;height:30px;border:3px solid var(--ink);border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;flex-shrink:0;}
  .cat-head h2{font-size:18px;margin:0;}
  .legend-row{display:flex;gap:14px;flex-wrap:wrap;margin:0 0 14px 40px;font-size:11.5px;}
  .legend-row span{display:inline-flex;align-items:center;gap:5px;}
  .legend-row i{width:11px;height:11px;border-radius:3px;display:inline-block;border:1.5px solid var(--ink);}
  .item-row{margin-bottom:18px;}
  .item-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;gap:10px;}
  .item-name{font-size:13.5px;font-weight:700;}
  .item-pct{font-size:13px;font-weight:900;font-family:"Archivo Black";flex-shrink:0;}
  .item-pct.good{color:var(--teal);}
  .item-pct.mid{color:var(--orange);}
  .item-pct.bad{color:var(--red);}
  .item-pct.none{color:#b0a8c0;}
  .bar-track{height:26px;border:2.5px solid var(--ink);border-radius:7px;overflow:hidden;display:flex;background:#fff;}
  .bar-seg{height:100%;transition:width .7s cubic-bezier(.2,.8,.2,1);}
  .item-meta{font-size:10.5px;color:#9b91ab;margin-top:3px;}
  .refresh-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
  .updated-at{font-size:11.5px;color:#897f9c;}
  .footer-note{position:relative;z-index:2;text-align:center;font-size:11px;color:rgba(255,255,255,.75);margin-top:18px;}
  .hidden{display:none!important;}
  @media(max-width:560px){.body-area{padding:20px 16px;}.legend-row{margin-left:0;}}
  @media(prefers-reduced-motion:reduce){.sparkle,.window{animation:none!important;}}
</style>
</head>
<body>
<div class="app-bg" id="appBg"></div>
<div class="stage">

  <div class="window" id="connectPanel">
    <div class="titlebar">
      <span class="label"><img src="logo_暑工.svg" alt="" class="logo-mini">滿意度分析後台</span>
      <div class="traffic"><span></span><span></span><span></span></div>
    </div>
    <div class="body-area">
      <div class="connect-wrap">
        <h2>連線至問卷後台</h2>
        <p>輸入問卷系統的 GAS 網址後點選連線，系統會即時從 Google 試算表讀取五區所有回覆並自動計算統計，無需手動匯出 CSV。</p>
        <div class="connect-row">
          <input type="text" id="gasUrlInput" placeholder="https://script.google.com/macros/s/…/exec" value="https://script.google.com/macros/s/AKfycbzwckfNp3LihxWrSc7nMSzIOKdz3rDEZHCuIUkwBDUvpTppy7ebK40cWco0zGyD1Nr9Nw/exec">
          <button class="btn btn-primary" id="connectBtn" onclick="connect()">
            <span id="connectBtnText">連線讀取</span>
            <span id="connectSpinner" class="spinner hidden"></span>
          </button>
        </div>
        <div id="connectError"></div>
      </div>
    </div>
  </div>

  <div id="dashPanel" class="hidden">
    <div class="window">
      <div class="titlebar">
        <span class="label">總覽</span>
        <div class="traffic"><span></span><span></span><span></span></div>
      </div>
      <div class="body-area">
        <div class="refresh-row">
          <div class="updated-at" id="updatedAt"></div>
          <button class="btn btn-teal btn-sm" onclick="refresh()">
            <span id="refreshSpinner" class="spinner hidden"></span>
            <span id="refreshText">重新整理</span>
          </button>
        </div>
        <div class="summary-grid" id="summaryGrid"></div>
      </div>
    </div>

    <div class="window">
      <div class="titlebar">
        <span class="label">場次篩選</span>
        <div class="traffic"><span></span><span></span><span></span></div>
      </div>
      <div class="body-area" style="padding-top:18px;padding-bottom:18px;">
        <div class="tab-row" id="tabRow"></div>
      </div>
    </div>

    <div id="categoryWindows"></div>
  </div>

</div>
<div class="footer-note">115 年度原住民族青年暑期工讀教育訓練　原住民族委員會</div>
<script>
const SCALE_LABELS = ["非常滿意","滿意","普通","不滿意","非常不滿意"];
const SCALE_COLORS = {5:"#076fb8",4:"#1FB6A6",3:"#F6C23E",2:"#F08A3C",1:"#E2222E"};
const CATEGORIES = [
  {title:"行政庶務與環境服務",subtitle:"就本次活動的行政安排進行評分"},
  {title:"課程：原住民族政策",subtitle:""},
  {title:"課程：公務經驗分享",subtitle:""},
  {title:"部落參訪體驗",subtitle:""},
];
const REDUCE_MOTION = window.matchMedia("(prefers-reduced-motion:reduce)").matches;

let gasUrl = "";
let lastData = null;
let currentRegion = "overall";

/* ── connect / refresh ── */
window.connect = async function(){
  const input = document.getElementById("gasUrlInput").value.trim();
  if(!input||!input.includes("script.google.com")){
    showErr("請輸入正確的 Google Apps Script 網址。"); return;
  }
  gasUrl = input;
  setBusy("connect",true); clearErr();
  await fetchStats();
  setBusy("connect",false);
};
window.refresh = async function(){
  if(!gasUrl) return;
  setBusy("refresh",true);
  await fetchStats();
  setBusy("refresh",false);
};

async function fetchStats(){
  try{
    const sep = gasUrl.includes("?")?"&":"?";
    const res  = await fetch(gasUrl+sep+"action=stats");
    const data = await res.json();
    if(!data.success) throw new Error(data.error||"GAS 回傳錯誤");
    lastData = data;
    renderDash(data);
    document.getElementById("connectPanel").classList.add("hidden");
    document.getElementById("dashPanel").classList.remove("hidden");
  }catch(err){
    showErr("連線失敗："+err.message+"。請確認 GAS 網址正確，且部署時「誰可以存取」設為「所有人」。");
  }
}

/* ── render ── */
function renderDash(data){
  renderSummary(data);
  renderTabs(data);
  renderCategories(data,currentRegion);
  document.getElementById("updatedAt").textContent="資料更新時間："+(data.updatedAt||"—");
}

function renderSummary(data){
  const ov = data.overall||{};
  const cnt = ov.count||0;
  const activeR = (data.regions||[]).filter(r=>data.byRegion[r]&&data.byRegion[r].count>0).length;
  let avgPct = null;
  if(ov.items&&ov.items.length){
    const valid=ov.items.filter(i=>i.pct!==null);
    if(valid.length) avgPct=valid.reduce((a,i)=>a+i.pct,0)/valid.length;
  }
  document.getElementById("summaryGrid").innerHTML=`
    <div class="stat-card"><div class="num blue" data-target="${cnt}" data-dec="0">0</div><div class="lbl">總回覆份數</div></div>
    <div class="stat-card"><div class="num teal" data-target="${avgPct!==null?avgPct.toFixed(1):0}" data-dec="1" data-suf="%">${avgPct!==null?avgPct.toFixed(1):"—"}%</div><div class="lbl">整體平均滿意度</div></div>
    <div class="stat-card"><div class="num pink" data-target="${activeR}" data-dec="0">0</div><div class="lbl">已有回覆場次</div></div>
  `;
  animateCountUps(document.getElementById("summaryGrid"));
}

function renderTabs(data){
  const regions=data.regions||[];
  const tabs=[{key:"overall",label:"全部場次"}].concat(
    regions.map(r=>({key:r,label:r+" ("+(data.byRegion[r]?data.byRegion[r].count:0)+")"}))
  );
  document.getElementById("tabRow").innerHTML=tabs.map(t=>`
    <button class="tab-btn ${currentRegion===t.key?"active":""}" onclick="switchTab('${t.key}')">${t.label}</button>
  `).join("")
  + `<button class="tab-btn" style="background:var(--red);color:#fff;margin-left:auto;" onclick="exportReport('${currentRegion}')">⬇ 產出此場次報告</button>`;
}
window.switchTab=function(r){ currentRegion=r; if(lastData) renderDash(lastData); };

window.exportReport=function(region){
  if(!lastData) return;
  const source = region==="overall" ? lastData.overall : lastData.byRegion[region];
  if(!source||!source.count){ alert("此場次尚無回覆資料"); return; }

  const CATS=[
    {title:"行政庶務與環境服務",subtitle:"就本次活動的行政安排進行評分"},
    {title:"課程：原住民族政策",subtitle:""},
    {title:"課程：公務經驗分享",subtitle:""},
    {title:"部落參訪體驗",subtitle:""},
  ];
  const SLABELS=["非常滿意","滿意","普通","不滿意","非常不滿意"];
  const SCOLORS={5:"#076fb8",4:"#1FB6A6",3:"#F6C23E",2:"#F08A3C",1:"#E2222E"};
  const items   = source.items||[];
  const count   = source.count;
  const bycat   = {};
  items.forEach(it=>{ if(!bycat[it.category]) bycat[it.category]=[]; bycat[it.category].push(it); });

  const regionLabel = region==="overall"?"全部場次（五區合計）":region;
  const eventFull   = region==="overall"?"全部場次"
    : Object.values(lastData.byRegion).length
      ? (lastData.byRegion[region]&&lastData.byRegion[region].items
         ? "（詳見分析後台）" : "") : "";

  // Overall avg pct
  const valid = items.filter(i=>i.pct!==null);
  const avgPct = valid.length ? (valid.reduce((a,i)=>a+i.pct,0)/valid.length) : null;

  function pctClass(p){ return p===null?"#b0a8c0":p>=85?"#1FB6A6":p>=70?"#F08A3C":"#E2222E"; }

  function barHtml(dist, total){
    if(!total) return `<div style="height:20px;background:#eee;border-radius:4px;"></div>`;
    return `<div style="display:flex;height:20px;border-radius:4px;overflow:hidden;border:1.5px solid #15131A;">
      ${[5,4,3,2,1].map(s=>{
        const w=total?Math.round(Number(dist[s]||0)/total*1000)/10:0;
        return w>0?`<div style="width:${w}%;background:${SCOLORS[s]};position:relative;" title="${SLABELS[5-s]} ${dist[s]}筆"></div>`:"";
      }).join("")}
    </div>`;
  }

  function tableRows(){
    return items.map((it,idx)=>`
      <tr style="background:${idx%2===0?'#fff':'#f9f5f0'};">
        <td style="padding:6px 10px;font-size:11px;color:#5a5468;">${it.category}</td>
        <td style="padding:6px 10px;font-size:12px;font-weight:700;">${it.label}</td>
        <td style="padding:6px 10px;text-align:center;font-size:13px;font-weight:900;color:${pctClass(it.pct)};">${it.pct!==null?it.pct.toFixed(1)+"%":"—"}</td>
        <td style="padding:6px 10px;text-align:center;font-size:12px;">${it.avg!==null?it.avg.toFixed(2):"—"}</td>
        <td style="padding:6px 10px;width:240px;">${barHtml(it.dist,it.count)}</td>
      </tr>`).join("");
  }

  function catSections(){
    return CATS.map((cat,ci)=>{
      const catItems=bycat[cat.title]||[];
      const rows=catItems.map(it=>{
        const total=it.count;
        const w={};
        [5,4,3,2,1].forEach(s=>{ w[s]=total?Math.round(Number(it.dist[s]||0)/total*1000)/10:0; });
        return `
        <div style="margin-bottom:18px;page-break-inside:avoid;">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;">
            <span style="font-size:13px;font-weight:700;">${it.label}</span>
            <span style="font-size:14px;font-weight:900;font-family:Arial;color:${pctClass(it.pct)};">${it.pct!==null?it.pct.toFixed(1)+"%":"—"}</span>
          </div>
          <div style="display:flex;height:22px;border-radius:5px;overflow:hidden;border:2px solid #15131A;">
            ${[5,4,3,2,1].map(s=>w[s]>0?`<div style="width:${w[s]}%;background:${SCOLORS[s]};-webkit-print-color-adjust:exact;print-color-adjust:exact;"></div>`:"").join("")}
          </div>
          <div style="font-size:10px;color:#897f9c;margin-top:3px;">
            平均 ${it.avg!==null?it.avg.toFixed(2):"—"} / 5　·　有效回覆 ${it.count} 筆
            　${[5,4,3,2,1].map(s=>`${SLABELS[5-s]} ${it.dist[s]||0}`).join("　")}
          </div>
        </div>`;
      }).join("");

      return `
      <div style="margin-top:28px;page-break-inside:avoid;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:6px;border-bottom:2.5px solid #076fb8;">
          <div style="width:26px;height:26px;border-radius:50%;background:#F6C23E;border:2.5px solid #15131A;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;flex-shrink:0;">${ci+1}</div>
          <h3 style="margin:0;font-size:15px;color:#076fb8;">${cat.title}</h3>
          ${cat.subtitle?`<span style="font-size:11px;color:#897f9c;">（${cat.subtitle}）</span>`:""}
        </div>
        <div style="display:flex;gap:20px;font-size:10.5px;margin-bottom:12px;flex-wrap:wrap;">
          ${SLABELS.map((l,i)=>`<span style="display:inline-flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:${SCOLORS[5-i]};display:inline-block;border:1px solid #15131A;-webkit-print-color-adjust:exact;print-color-adjust:exact;"></span>${l}</span>`).join("")}
        </div>
        ${rows}
      </div>`;
    }).join("");
  }

  const now = new Date().toLocaleString("zh-TW",{hour12:false});
  const html = `<!DOCTYPE html><html lang="zh-Hant"><head>
<meta charset="UTF-8">
<title>滿意度報告 — ${regionLabel}</title>
<style>
  @page{size:A4 portrait;margin:18mm 16mm 18mm 20mm;}
  *{box-sizing:border-box;}
  body{font-family:"Microsoft JhengHei","Noto Sans TC",sans-serif;color:#15131A;font-size:13px;line-height:1.6;margin:0;padding:0;}
  @media print{
    .no-print{display:none!important;}
    body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  }
</style>
</head><body>

<!-- 列印按鈕（列印時自動隱藏）-->
<div class="no-print" style="position:fixed;top:16px;right:16px;z-index:999;display:flex;gap:8px;">
  <button onclick="window.print()" style="background:#076fb8;color:#fff;border:2.5px solid #15131A;border-radius:10px;padding:10px 20px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;box-shadow:3px 3px 0 #15131A;">列印 / 儲存 PDF</button>
  <button onclick="window.close()" style="background:#fff;border:2.5px solid #15131A;border-radius:10px;padding:10px 16px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;box-shadow:3px 3px 0 #15131A;">關閉</button>
</div>

<!-- 封面資訊 -->
<div style="border:3px solid #15131A;border-radius:12px;padding:18px 22px;margin-bottom:24px;background:#FBF3EA;">
  <div style="font-size:11.5px;color:#5a5468;margin-bottom:4px;">115年度原住民族青年暑期工讀教育訓練</div>
  <div style="font-size:11.5px;color:#5a5468;margin-bottom:4px;">原青 MASIAL！職感未來式</div>
  <div style="font-size:22px;font-weight:900;margin:4px 0 10px;">滿意度問卷分析報告</div>
  <div style="display:flex;gap:16px;flex-wrap:wrap;">
    <span style="background:#E2222E;color:#fff;border:2px solid #15131A;border-radius:999px;padding:4px 14px;font-size:12px;font-weight:700;">${regionLabel}</span>
    <span style="font-size:12px;color:#5a5468;margin:auto 0;">回覆份數：<strong>${count}</strong>　·　整體平均滿意度：<strong style="color:${pctClass(avgPct)};">${avgPct!==null?avgPct.toFixed(1)+"%":"—"}</strong>　·　產出時間：${now}</span>
  </div>
</div>

<!-- 各題長條圖 -->
${catSections()}

<!-- 頁尾 -->
<div style="margin-top:32px;padding-top:10px;border-top:1.5px solid #e3d9cf;font-size:10px;color:#897f9c;display:flex;justify-content:space-between;">

function renderCategories(data,region){
  const source = region==="overall"?(data.overall||{}):(data.byRegion[region]||{});
  const items  = source.items||[];
  const count  = source.count||0;
  if(!items.length){
    document.getElementById("categoryWindows").innerHTML=
      `<div class="window"><div class="body-area" style="text-align:center;color:#897f9c;padding:30px;">此場次尚無回覆資料</div></div>`;
    return;
  }
  const bycat={};
  items.forEach(it=>{ if(!bycat[it.category]) bycat[it.category]=[]; bycat[it.category].push(it); });
  const wrap=document.getElementById("categoryWindows");
  wrap.innerHTML="";
  CATEGORIES.forEach((cat,ci)=>{
    const catItems=bycat[cat.title]||[];
    const win=document.createElement("div");
    win.className="window";
    win.innerHTML=`
      <div class="titlebar"><span class="label">${cat.title}</span><div class="traffic"><span></span><span></span><span></span></div></div>
      <div class="body-area">
        <div class="cat-head"><span class="idx">${ci+1}</span><h2>${cat.title}</h2></div>
        ${cat.subtitle?`<p style="font-size:12px;color:#897f9c;margin:0 0 14px 40px;">${cat.subtitle}</p>`:""}
        <div class="legend-row">${SCALE_LABELS.map((l,i)=>`<span><i style="background:${SCALE_COLORS[5-i]}"></i>${l}</span>`).join("")}</div>
        <div class="items-host"></div>
      </div>`;
    const host=win.querySelector(".items-host");
    catItems.forEach(item=>{
      const row=document.createElement("div");
      row.className="item-row";
      const total=Object.values(item.dist).reduce((a,b)=>a+Number(b),0);
      const segs=[5,4,3,2,1].map(s=>{
        const w=total?(Number(item.dist[s]||0)/total*100):0;
        return w>0?`<div class="bar-seg" data-w="${w}" style="width:0%;background:${SCALE_COLORS[s]}" title="${SCALE_LABELS[5-s]} ${item.dist[s]}筆"></div>`:"";
      }).join("");
      const pc=item.pct===null?"none":item.pct>=85?"good":item.pct>=70?"mid":"bad";
      const pt=item.pct!==null?item.pct.toFixed(1)+"%":"—";
      row.innerHTML=`
        <div class="item-top">
          <span class="item-name">${item.label}</span>
          <span class="item-pct ${pc}" ${item.pct!==null?`data-target="${item.pct.toFixed(1)}" data-dec="1" data-suf="%"`:""}>${pt}</span>
        </div>
        <div class="bar-track">${segs}</div>
        <div class="item-meta">平均分數 ${item.avg!==null?item.avg.toFixed(2):"—"} / 5　·　有效回覆 ${item.count} 筆　·　總份數 ${count}</div>`;
      host.appendChild(row);
    });
    wrap.appendChild(win);
    requestAnimationFrame(()=>{
      win.querySelectorAll(".bar-seg[data-w]").forEach(s=>{ s.style.width=s.dataset.w+"%"; });
    });
  });
  animateCountUps(wrap);
}

/* ── count-up ── */
function animateCountUps(scope){
  scope.querySelectorAll("[data-target]").forEach(el=>{
    const t=parseFloat(el.dataset.target),d=parseInt(el.dataset.dec||"0",10),s=el.dataset.suf||"";
    if(isNaN(t)) return;
    if(REDUCE_MOTION){ el.textContent=t.toFixed(d)+s; return; }
    const dur=650,st=performance.now();
    (function step(now){
      const p=Math.min((now-st)/dur,1),e=1-Math.pow(1-p,3);
      el.textContent=(t*e).toFixed(d)+s;
      if(p<1) requestAnimationFrame(step); else el.textContent=t.toFixed(d)+s;
    })(performance.now());
  });
}

/* ── helpers ── */
function showErr(msg){ document.getElementById("connectError").innerHTML=`<div class="error-msg" style="line-height:1.8">${msg}</div>`; }
function clearErr(){ document.getElementById("connectError").innerHTML=""; }
function setBusy(which,on){
  if(which==="connect"){
    document.getElementById("connectBtn").disabled=on;
    document.getElementById("connectBtnText").textContent=on?"讀取中...":"連線讀取";
    document.getElementById("connectSpinner").classList.toggle("hidden",!on);
  } else {
    document.getElementById("refreshText").textContent=on?"更新中...":"重新整理";
    document.getElementById("refreshSpinner").classList.toggle("hidden",!on);
  }
}

/* ── sparkle ── */
(function(){
  const bg=document.getElementById("appBg"),layer=document.createElement("div");
  layer.className="sparkle-layer"; bg.appendChild(layer);
  [[4,8],[10,68],[88,14],[92,72],[50,3],[3,40],[95,44]].forEach(([x,y])=>{
    const s=document.createElement("div"); s.className="sparkle";
    s.style.left=x+"%"; s.style.top=y+"%";
    s.style.setProperty("--s",(0.6+Math.random()*0.8).toFixed(2));
    s.style.setProperty("--r",(Math.random()*30)+"deg");
    s.style.animationDelay=(Math.random()*3)+"s";
    layer.appendChild(s);
  });
  const fine=window.matchMedia("(pointer:fine)").matches;
  if(!REDUCE_MOTION&&fine){
    document.addEventListener("mousemove",e=>{
      const dx=(e.clientX/window.innerWidth-.5)*2,dy=(e.clientY/window.innerHeight-.5)*2;
      layer.style.transform=`translate(${dx*12}px,${dy*12}px)`;
    });
  }
})();
